<!DOCTYPE html>
<html>
<head>
    <title>Time Capsule</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>⏳ Time Capsule</h1>

<!-- Success Message -->
{% if request.args.get('success') %}
    <p class="success-msg">✅ Capsule saved successfully!</p>
{% endif %}

<!-- Form -->
<form method="POST" action="/add">

    <textarea name="message" placeholder="Enter your message" required></textarea>

    <input type="date" name="date" required>

    <button type="submit">Save Capsule</button>

</form>

<hr>

<!-- Capsules -->
<div class="container">
    {% for c in capsules %}
    <div class="card">

        <p><strong>Date:</strong> {{ c.date }}</p>

        {% if c.date > current_date %}
            <p>🔒 Locked (Opens in <span class="countdown" data-date="{{ c.date }}"></span> days)</p>
        {% else %}
            <p>{{ c.message }}</p>
        {% endif %}

        <a href="/edit/{{ c.id }}">Edit</a> |
        <a href="/delete/{{ c.id }}">Delete</a>

    </div>
    {% endfor %}
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
