<!DOCTYPE html>
<html>
<head>
    <title>Database Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #2c3e50, #3498db);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        table {
            margin: auto;
            margin-top: 30px;
            border-collapse: collapse;
            width: 80%;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        tr:hover {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h1>📊 Time Capsule Database</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Message</th>
            <th>Date</th>
        </tr>

        {% for c in capsules %}
        <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.message }}</td>
            <td>{{ c.date }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
