<!DOCTYPE html>
<html>
<head>
    <title>Database View</title>
</head>
<body>

    <h1>📊 Database Records</h1>

    <table border="1" cellpadding="10">
        <tr>
            <th>ID</th>
            <th>Message</th>
            <th>Date</th>
        </tr>

        {% for c in capsules %}
        <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.message }}</td>
            <td>{{ c.date }}</td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
